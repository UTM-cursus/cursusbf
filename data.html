<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instituts & Universités — Burkina Faso</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #8a8fa8;
    --accent: #e8a020;
    --accent2: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
    --gold: #f4c430;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #0d0f14 0%, #1a1f2e 50%, #0d0f14 100%);
    border-bottom: 1px solid var(--border);
    padding: 48px 40px 36px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(232,160,32,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -40px; left: 100px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
    border-radius: 50%;
  }
  .header-inner {
    max-width: 1300px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .header-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(232,160,32,0.1);
    border: 1px solid rgba(232,160,32,0.25);
    padding: 5px 14px;
    border-radius: 30px;
    margin-bottom: 18px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 4vw, 54px);
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff 30%, #c8cad8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    font-size: 15px;
    color: var(--muted);
    max-width: 500px;
    line-height: 1.6;
  }
  .stats-row {
    display: flex;
    gap: 32px;
    margin-top: 32px;
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* ── FILTERS ── */
  .filters-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 40px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .filters-inner {
    max-width: 1300px;
    margin: 0 auto;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
  }
  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px 10px 42px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 18px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .sort-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }

  /* ── MAIN GRID ── */
  .main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 36px 40px 60px;
  }
  .results-label {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .results-label span { color: var(--text); font-weight: 600; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
    gap: 20px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform .25s, border-color .25s, box-shadow .25s;
    display: flex;
    flex-direction: column;
    animation: fadeUp .4s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: rgba(232,160,32,0.3);
    box-shadow: 0 16px 48px rgba(0,0,0,0.35);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    padding: 20px 22px 16px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
  }
  .card-logo {
    width: 46px; height: 46px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
    flex-shrink: 0;
  }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 3px 9px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-type {
    background: rgba(59,130,246,0.12);
    color: #7ab3f8;
    border: 1px solid rgba(59,130,246,0.2);
  }
  .badge-city {
    background: rgba(255,255,255,0.05);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .card-kpis {
    padding: 14px 22px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .kpi {
    background: var(--surface);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .kpi-val {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .kpi-val.accent { color: var(--accent); }
  .kpi-val.green  { color: var(--green); }
  .kpi-val.blue   { color: var(--accent2); }
  .kpi-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  /* Stars */
  .stars {
    display: flex;
    gap: 1px;
    font-size: 12px;
  }
  .star { color: #888; }
  .star.filled { color: var(--gold); }

  /* Programs accordion */
  .programs-toggle {
    padding: 14px 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }
  .programs-toggle:hover { background: var(--surface2); }
  .programs-toggle span {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
  }
  .programs-toggle .count {
    font-size: 12px;
    background: rgba(232,160,32,0.12);
    color: var(--accent);
    border: 1px solid rgba(232,160,32,0.2);
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .toggle-icon {
    font-size: 11px;
    color: var(--muted);
    transition: transform .2s;
    margin-left: 8px;
  }
  .toggle-icon.open { transform: rotate(180deg); }

  .programs-list {
    display: none;
    flex-direction: column;
    padding: 0 22px 4px;
    max-height: 280px;
    overflow-y: auto;
  }
  .programs-list.open { display: flex; }
  .programs-list::-webkit-scrollbar { width: 4px; }
  .programs-list::-webkit-scrollbar-track { background: transparent; }
  .programs-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .prog-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    gap: 12px;
  }
  .prog-item:last-child { border-bottom: none; }
  .prog-name {
    font-size: 12.5px;
    color: var(--muted);
    line-height: 1.4;
    flex: 1;
  }
  .prog-price {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .prog-price.free { color: var(--green); }

  .card-footer {
    padding: 14px 22px;
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .price-display {
    display: flex;
    flex-direction: column;
  }
  .price-from { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
  .price-val {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1.1;
  }
  .price-free { color: var(--green); }
  .price-unit { font-size: 10px; color: var(--muted); }
  .match-pill {
    background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(34,197,94,0.05));
    border: 1px solid rgba(34,197,94,0.25);
    color: var(--green);
    padding: 6px 14px;
    border-radius: 30px;
    font-size: 12px;
    font-weight: 700;
  }

  /* Empty state */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }

  @media (max-width: 700px) {
    header, .filters-bar, .main { padding-left: 20px; padding-right: 20px; }
    .grid { grid-template-columns: 1fr; }
    .stats-row { gap: 20px; }
  }
</style>
</head>

</div>

<main class="main">

  <div class="grid" id="grid"></div>
</main>

function fmt(n) {
  if (n === 0) return 'Gratuit';
  return new Intl.NumberFormat('fr-FR').format(n) + ' FCFA';
}

function initials(name) {
  const w = name.replace(/[()]/g,'').split(/[\s\-–]+/);
  if (w.length >= 2) return (w[0][0] + w[1][0]).toUpperCase();
  return name.substring(0,2).toUpperCase();
}

function stars(rating) {
  let s = '';
  for (let i = 1; i <= 5; i++) {
    s += `<span class="star ${i <= Math.round(rating) ? 'filled' : ''}">★</span>`;
  }
  return s;
}

function buildCard(inst, idx) {
  const isFree = inst.price <= 15000;
  const priceClass = isFree ? 'price-free' : '';
  const delay = idx * 0.05;

  const progItems = inst.programs.map(p => {
    const pFree = p.price <= 15000;
    return `<div class="prog-item">
      <span class="prog-name">${p.name}</span>
      <span class="prog-price ${pFree ? 'free' : ''}">${fmt(p.price)}</span>
    </div>`;
  }).join('');

  return `
  <div class="card" style="animation-delay:${delay}s" data-category="${inst.category}" data-name="${inst.name.toLowerCase()}" data-programs="${inst.programs.map(p=>p.name).join(' ').toLowerCase()}">
    <div class="card-header">
      <div class="card-logo">${initials(inst.name)}</div>
      <div class="card-title-wrap">
        <div class="card-name" title="${inst.name}">${inst.name}</div>
        <div class="card-meta">
          <span class="badge badge-type">${inst.type}</span>
          <span class="badge badge-city">📍 ${inst.city}</span>
        </div>
      </div>
    </div>

    <div class="card-kpis">
      <div class="kpi">
        <div class="kpi-val accent">${inst.match}%</div>
        <div class="kpi-label">Match</div>
      </div>
      <div class="kpi">
        <div class="kpi-val" style="display:flex;gap:1px;justify-content:center">
          <div class="stars">${stars(inst.rating)}</div>
        </div>
        <div class="kpi-label">${inst.rating}/5</div>
      </div>
      <div class="kpi">
        <div class="kpi-val blue">${inst.programs.length}</div>
        <div class="kpi-label">Filières</div>
      </div>
    </div>

    <div class="programs-toggle" onclick="togglePrograms(this)">
      <span>Voir les filières <span class="count">${inst.programs.length}</span></span>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="programs-list">${progItems}</div>

    <div class="card-footer">
      <div class="price-display">
        <span class="price-from">À PARTIR DE</span>
        <span class="price-val ${priceClass}">${fmt(inst.price)}</span>
        <span class="price-unit">par an</span>
      </div>
      <div class="match-pill">✓ ${inst.match}% match</div>
    </div>
  </div>`;
}

function togglePrograms(el) {
  const list = el.nextElementSibling;
  const icon = el.querySelector('.toggle-icon');
  const open = list.classList.toggle('open');
  icon.classList.toggle('open', open);
}

let currentFilter = 'all';
let currentSort = 'match';
let currentSearch = '';

function render() {
  let data = [...institutes];

  if (currentFilter !== 'all') data = data.filter(i => i.category === currentFilter);

  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    data = data.filter(i =>
      i.name.toLowerCase().includes(q) ||
      i.type.toLowerCase().includes(q) ||
      i.programs.some(p => p.name.toLowerCase().includes(q))
    );
  }

  if (currentSort === 'match') data.sort((a,b) => b.match - a.match);
  else if (currentSort === 'rating') data.sort((a,b) => b.rating - a.rating);
  else if (currentSort === 'price-asc') data.sort((a,b) => a.price - b.price);
  else if (currentSort === 'price-desc') data.sort((a,b) => b.price - a.price);
  else if (currentSort === 'alpha') data.sort((a,b) => a.name.localeCompare(b.name));

  const grid = document.getElementById('grid');
  document.getElementById('shown-count').textContent = data.length;

  if (data.length === 0) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <h3>Aucun résultat</h3>
      <p>Essayez un autre terme ou réinitialisez les filtres.</p>
    </div>`;
    return;
  }

  grid.innerHTML = data.map((inst, i) => buildCard(inst, i)).join('');
}

// Stats
document.getElementById('total-count').textContent = institutes.length;
document.getElementById('prog-count').textContent = institutes.reduce((s,i)=>s+i.programs.length,0);

// Events
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('sort').addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

document.getElementById('search').addEventListener('input', e => {
  currentSearch = e.target.value;
  render();
});

render();
</script>
